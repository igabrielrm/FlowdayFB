<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Mi Perfil - Event Organizer UCE</title>
    <th:block th:replace="~{fragments/pwa-head :: pwaHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <style>
        .perfil-avatar-grande {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 32px;
            margin: 0 auto 1rem;
        }
        .perfil-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .perfil-form .form-group {
            margin-bottom: 1rem;
        }
        .perfil-form .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text3);
            margin-bottom: .25rem;
            text-transform: uppercase;
            letter-spacing: .03em;
        }
        .perfil-form .form-control {
            width: 100%;
            padding: .6rem 1rem;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text1);
            font-size: 14px;
        }
        .perfil-form .form-control:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        .perfil-form .form-control[readonly] {
            opacity: .6;
            cursor: not-allowed;
        }
        .seccion-emergencia {
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            margin-top: 1.5rem;
        }
        .seccion-seguridad {
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            margin-top: 1.5rem;
        }
        .seccion-seguridad h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent-blue);
        }
        .seccion-emergencia h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent-red);
        }
        .btn-actions {
            display: flex;
            gap: .75rem;
            margin-top: 1.5rem;
        }
        @media (max-width: 640px) {
            .perfil-form .form-row {
                grid-template-columns: 1fr;
            }
            .btn-actions {
                flex-direction: column;
            }
            .btn-actions .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="layout">

    <aside th:replace="~{dashboard :: menuLateral}"></aside>
    
    <div class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="btn-icon" onclick="toggleSidebar()" aria-label="Menú">☰</button>
                <span class="topbar-title">👤 Mi Perfil</span>
            </div>
            <div class="topbar-actions">
                <div th:replace="~{fragments/notificaciones-bell :: campana}"></div>
                <button class="btn-icon" data-theme-btn onclick="toggleTheme()">☀️</button>
            </div>
        </header>

        <main class="page-body">
            <div class="card fade-in" style="max-width:680px;margin:0 auto;">

                <div th:if="${error}" class="alert alert-danger">
                    <span th:text="${error}"></span>
                </div>

                <div th:if="${exito}" class="alert alert-success">
                    <span th:text="${exito}"></span>
                </div>

                <div class="perfil-avatar-grande" th:text="${#strings.substring(usuario.nombre,0,2).toUpperCase()}">KD</div>
                <h3 style="text-align:center;font-size:16px;font-weight:700;margin-bottom:.25rem;" th:text="${usuario.nombre}">Karla Domínguez</h3>
                <p style="text-align:center;font-size:13px;color:var(--text3);" th:text="${usuario.correo}">karla@uce.edu.ec</p>

                <form th:action="@{/perfil/actualizar}" method="post" class="perfil-form" style="margin-top:1.5rem;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" name="nombre" class="form-control" th:value="${usuario.nombre}" required/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Correo</label>
                            <input type="email" class="form-control" th:value="${usuario.correo}" readonly/>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Carrera</label>
                            <select name="carrera" class="form-control">
                                <option th:selected="${usuario.carrera == 'Ingeniería en Sistemas'}" value="Ingeniería en Sistemas">Ingeniería en Sistemas</option>
                                <option th:selected="${usuario.carrera == 'Ingeniería Civil'}" value="Ingeniería Civil">Ingeniería Civil</option>
                                <option th:selected="${usuario.carrera == 'Medicina'}" value="Medicina">Medicina</option>
                                <option th:selected="${usuario.carrera == 'Derecho'}" value="Derecho">Derecho</option>
                                <option th:selected="${usuario.carrera == 'Economía'}" value="Economía">Economía</option>
                                <option th:selected="${usuario.carrera == 'Arquitectura'}" value="Arquitectura">Arquitectura</option>
                                <option th:selected="${usuario.carrera == 'Psicología'}" value="Psicología">Psicología</option>
                                <option th:selected="${usuario.carrera == 'Comunicación Social'}" value="Comunicación Social">Comunicación Social</option>
                                <option th:selected="${usuario.carrera == 'Ingeniería Química'}" value="Ingeniería Química">Ingeniería Química</option>
                                <option th:selected="${usuario.carrera == 'Enfermería'}" value="Enfermería">Enfermería</option>
                                <option th:selected="${usuario.carrera == 'Otra'}" value="Otra">Otra</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" name="telefono" class="form-control" th:value="${usuario.telefono}"
                                   pattern="\d{10}" maxlength="10" title="10 dígitos numéricos, ej: 0991234567"
                                   placeholder="0991234567"/>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Fecha de nacimiento</label>
                            <input type="date" name="fechaNacimiento" class="form-control" th:value="${usuario.fechaNacimiento}"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Género</label>
                            <select name="genero" class="form-control">
                                <option th:selected="${usuario.genero == 'Masculino'}" value="Masculino">Masculino</option>
                                <option th:selected="${usuario.genero == 'Femenino'}" value="Femenino">Femenino</option>
                                <option th:selected="${usuario.genero == 'No binario'}" value="No binario">No binario</option>
                                <option th:selected="${usuario.genero == 'Prefiero no decir'}" value="Prefiero no decir">Prefiero no decir</option>
                            </select>
                        </div>
                    </div>

                    <!-- ===== CONTACTO DE EMERGENCIA ===== -->
                    <div class="seccion-emergencia">
                        <h4>🚨 Contacto de emergencia</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Nombre</label>
                                <input type="text" name="nombreEmergencia" class="form-control" th:value="${usuario.nombreEmergencia}"/>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Teléfono</label>
                                <input type="tel" name="telefonoEmergencia" class="form-control" th:value="${usuario.telefonoEmergencia}"
                                       pattern="\d{10}" maxlength="10" title="10 dígitos numéricos"
                                       placeholder="0991234567"/>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Relación</label>
                            <select name="relacionEmergencia" class="form-control">
                                <option th:selected="${usuario.relacionEmergencia == 'Padre'}" value="Padre">Padre</option>
                                <option th:selected="${usuario.relacionEmergencia == 'Madre'}" value="Madre">Madre</option>
                                <option th:selected="${usuario.relacionEmergencia == 'Hermano/a'}" value="Hermano/a">Hermano/a</option>
                                <option th:selected="${usuario.relacionEmergencia == 'Pareja'}" value="Pareja">Pareja</option>
                                <option th:selected="${usuario.relacionEmergencia == 'Amigo/a de confianza'}" value="Amigo/a de confianza">Amigo/a de confianza</option>
                                <option th:selected="${usuario.relacionEmergencia == 'Otro familiar'}" value="Otro familiar">Otro familiar</option>
                            </select>
                        </div>
                    </div>

                    <div class="btn-actions">
                        <button type="submit" class="btn btn-primary btn-full">Guardar cambios</button>
                        <a th:href="@{/dashboard}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>

                <!-- Cambiar contraseña (formulario separado — no anidar forms) -->
                <div class="seccion-seguridad" style="margin-top:0;padding-top:0;border-top:none;">
                    <h4>🔒 Cambiar contraseña</h4>
                    <form th:action="@{/perfil/contrasena}" method="post">
                        <div class="form-group">
                            <label class="form-label">Contraseña actual</label>
                            <input type="password" name="contrasenaActual" class="form-control" required minlength="4" autocomplete="current-password"/>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Nueva contraseña</label>
                                <input type="password" name="contrasenaNueva" class="form-control" required minlength="4" autocomplete="new-password"/>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Confirmar nueva</label>
                                <input type="password" name="contrasenaConfirmacion" class="form-control" required minlength="4" autocomplete="new-password"/>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-outline">Actualizar contraseña</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/companero-virtual :: companeroModal}"></div>
<div th:replace="~{fragments/companero-virtual :: companeroFlotante}"></div>

<script th:replace="~{fragments/layout-scripts :: layoutScripts}"></script>
<script th:replace="~{fragments/companero-virtual :: companeroScripts}"></script>
<script th:replace="~{fragments/companero-virtual :: companeroFlotanteScripts}"></script>
</body>
</html>
