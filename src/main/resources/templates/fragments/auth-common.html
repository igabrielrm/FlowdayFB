<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Fondo auth: usa el mismo patrón global que body::before (bg-pattern) -->
<div th:fragment="authBackground" class="auth-page-bg" aria-hidden="true">
    <div class="auth-page-bg-overlay" id="authBgOverlay"></div>
</div>

<div th:fragment="authTopbar" class="auth-topbar">
    <div class="auth-topbar-brand">
        <img th:src="@{/images/uce-escudo.png}" alt="Escudo UCE" class="auth-topbar-logo" width="46" height="46"/>
        <span class="auth-topbar-title">Universidad Central del Ecuador</span>
    </div>
    <button type="button" class="btn-icon auth-theme-btn" id="authThemeBtn" onclick="toggleAuthTheme()" aria-label="Cambiar tema">☀️</button>
</div>

<script th:fragment="authThemeScript">
(function () {
    function getTheme() {
        return localStorage.getItem('theme') ||
            (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    }

    window.applyAuthTheme = function (theme) {
        document.documentElement.setAttribute('data-theme', theme);
        const overlay = document.getElementById('authBgOverlay');
        const btn = document.getElementById('authThemeBtn');
        if (overlay) {
            overlay.classList.toggle('auth-overlay-light', theme === 'light');
        }
        if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    };

    window.toggleAuthTheme = function () {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', next);
        location.reload();
    };

    applyAuthTheme(getTheme());
})();
</script>

</body>
</html>
