<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<script th:fragment="layoutScripts" th:inline="javascript">
    window.__chatUserId = /*[[${chatUserId}]]*/ null;

    function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', next);
        location.reload();
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const layout = document.querySelector('.layout');
        if (!sidebar || !layout) return;

        if (window.innerWidth <= 768) {
            sidebar.classList.toggle('open');
        } else {
            layout.classList.toggle('sidebar-collapsed');
            localStorage.setItem('sidebarCollapsed', layout.classList.contains('sidebar-collapsed'));
        }
    }

    (function initLayout() {
        const saved = localStorage.getItem('theme') ||
            (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', saved);
        document.querySelectorAll('[data-theme-btn]').forEach(btn => {
            btn.textContent = saved === 'dark' ? '☀️' : '🌙';
        });

        if (localStorage.getItem('sidebarCollapsed') === 'true' && window.innerWidth > 768) {
            document.querySelector('.layout')?.classList.add('sidebar-collapsed');
        }
    })();

    /* ===== NOTIFICACIONES ===== */
    let notifDropdownAbierto = false;

    function actualizarBadgeNotif(count) {
        const badge = document.getElementById('notifBadge');
        if (!badge) return;
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.classList.remove('hidden');
        } else {
            badge.textContent = '';
            badge.classList.add('hidden');
        }
    }

    async function cargarNotificaciones() {
        const list = document.getElementById('notifList');
        if (!list) return;
        try {
            const res = await fetch('/api/notificaciones');
            if (!res.ok) throw new Error('Error');
            const items = await res.json();
            if (!items.length) {
                list.innerHTML = '<p class="notif-empty">No tienes notificaciones</p>';
                return;
            }
            list.innerHTML = items.map(n => `
                <div class="notif-item ${n.leida ? 'leida' : 'nueva'}" onclick="abrirNotificacion(${n.id}, '${(n.enlace || '').replace(/'/g, "\\'")}', '${n.tipo || ''}')">
                    <div class="notif-item-tipo">${iconoNotif(n.tipo)}</div>
                    <div class="notif-item-body">
                        <strong>${escHtml(n.titulo)}</strong>
                        <p>${escHtml(n.mensaje)}</p>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            list.innerHTML = '<p class="notif-empty">No se pudieron cargar</p>';
        }
    }

    function iconoNotif(tipo) {
        const map = { CONEXION: '👥', PRIORIDAD: '🔴', ACTIVIDAD: '📋', SISTEMA: 'ℹ️', ANUNCIO: '📢' };
        return map[tipo] || '🔔';
    }

    function escHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function posicionarNotifDropdown() {
        const dropdown = document.getElementById('notifDropdown');
        const btn = document.getElementById('btnNotificaciones');
        if (!dropdown || !btn) return;
        const rect = btn.getBoundingClientRect();
        dropdown.style.position = 'fixed';
        dropdown.style.top = Math.round(rect.bottom + 8) + 'px';
        dropdown.style.right = Math.round(window.innerWidth - rect.right) + 'px';
        dropdown.style.left = 'auto';
        dropdown.style.zIndex = '20000';
    }

    function toggleNotificaciones(e) {
        e.stopPropagation();
        const dropdown = document.getElementById('notifDropdown');
        const btn = document.getElementById('btnNotificaciones');
        if (!dropdown || !btn) return;
        notifDropdownAbierto = !notifDropdownAbierto;
        if (notifDropdownAbierto) {
            posicionarNotifDropdown();
            dropdown.classList.remove('hidden');
            cargarNotificaciones();
        } else {
            dropdown.classList.add('hidden');
        }
    }

    async function abrirNotificacion(id, enlace, tipo) {
        await fetch('/api/notificaciones/' + id + '/leer', { method: 'POST' });
        const res = await fetch('/api/notificaciones/contador');
        if (res.ok) {
            const data = await res.json();
            actualizarBadgeNotif(data.noLeidas);
        }
        const dropdown = document.getElementById('notifDropdown');
        if (dropdown) {
            dropdown.classList.add('hidden');
            notifDropdownAbierto = false;
        }

        if (tipo === 'ANUNCIO' || (enlace && enlace.startsWith('anuncio:'))) {
            const anuncioId = enlace && enlace.includes(':') ? enlace.split(':')[1] : null;
            if (anuncioId && typeof abrirModalAnuncio === 'function') {
                abrirModalAnuncio(anuncioId);
                return;
            }
        }

        if (enlace && enlace.startsWith('/')) {
            window.location.href = enlace;
        }
    }

    async function marcarTodasLeidas() {
        await fetch('/api/notificaciones/leer-todas', { method: 'POST' });
        actualizarBadgeNotif(0);
        cargarNotificaciones();
    }

    document.addEventListener('click', () => {
        const dropdown = document.getElementById('notifDropdown');
        if (dropdown && notifDropdownAbierto) {
            dropdown.classList.add('hidden');
            notifDropdownAbierto = false;
        }
    });

    document.addEventListener('DOMContentLoaded', async () => {
        const dropdown = document.getElementById('notifDropdown');
        if (dropdown && dropdown.parentElement !== document.body) {
            dropdown.classList.add('notif-dropdown-portal');
            document.body.appendChild(dropdown);
        }
        window.addEventListener('resize', () => {
            if (notifDropdownAbierto) posicionarNotifDropdown();
        });
        window.addEventListener('scroll', () => {
            if (notifDropdownAbierto) posicionarNotifDropdown();
        }, true);

        marcarNavActiva();
        if (!document.getElementById('notifBadge')) return;
        try {
            const res = await fetch('/api/notificaciones/contador');
            if (res.ok) {
                const data = await res.json();
                actualizarBadgeNotif(data.noLeidas);
            }
        } catch (_) {}
    });

    function marcarNavActiva() {
        const path = window.location.pathname;
        document.querySelectorAll('.sidebar-nav .nav-link[href]').forEach(a => {
            a.classList.remove('active');
            const href = a.getAttribute('href');
            if (!href || href === '/logout') return;
            if (path === href || (href !== '/dashboard' && path.startsWith(href))) {
                a.classList.add('active');
            }
        });
        if (path === '/dashboard' || path === '/') {
            document.querySelector('.sidebar-nav a[href="/dashboard"]')?.classList.add('active');
        }
    }

    window.mostrarToast = function (mensaje, esError) {
        let toast = document.getElementById('appToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'appToast';
            toast.className = 'app-toast';
            document.body.appendChild(toast);
        }
        toast.textContent = mensaje;
        toast.classList.toggle('app-toast-error', !!esError);
        toast.classList.add('app-toast-visible');
        clearTimeout(window._toastTimer);
        window._toastTimer = setTimeout(() => toast.classList.remove('app-toast-visible'), 3500);
    };

    window.abrirModalAnuncio = async function (anuncioId) {
        let modal = document.getElementById('modalAnuncio');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'modalAnuncio';
            modal.className = 'modal-overlay hidden';
            modal.setAttribute('role', 'dialog');
            modal.innerHTML = `
                <div class="modal-card modal-anuncio-card">
                    <div class="modal-header">
                        <div>
                            <span class="modal-anuncio-badge">📢 Comunicado UCE</span>
                            <h3 id="modalAnuncioTitulo">Anuncio</h3>
                        </div>
                        <button type="button" class="btn-icon" onclick="cerrarModalAnuncio()" aria-label="Cerrar">✕</button>
                    </div>
                    <div id="modalAnuncioCargando" class="detalle-cargando">Cargando comunicado...</div>
                    <div id="modalAnuncioContenido" class="hidden">
                        <p id="modalAnuncioDescripcion" class="modal-anuncio-desc"></p>
                        <dl class="detalle-dl modal-anuncio-meta">
                            <div><dt>Fecha límite</dt><dd id="modalAnuncioFechaLimite">—</dd></div>
                            <div><dt>Publicado</dt><dd id="modalAnuncioFechaPub">—</dd></div>
                            <div><dt>Estado</dt><dd id="modalAnuncioEstado">—</dd></div>
                        </dl>
                    </div>
                    <div id="modalAnuncioError" class="alert alert-danger hidden"></div>
                    <div class="modal-anuncio-footer">
                        <button type="button" class="btn btn-primary btn-full" onclick="cerrarModalAnuncio()">Entendido</button>
                    </div>
                </div>`;
            modal.addEventListener('click', e => { if (e.target.id === 'modalAnuncio') cerrarModalAnuncio(); });
            document.body.appendChild(modal);
        }
        modal.classList.remove('hidden');
        document.getElementById('modalAnuncioCargando')?.classList.remove('hidden');
        document.getElementById('modalAnuncioContenido')?.classList.add('hidden');
        document.getElementById('modalAnuncioError')?.classList.add('hidden');
        try {
            const res = await fetch('/api/anuncios/' + anuncioId);
            const data = await res.json();
            if (!data.ok) throw new Error(data.mensaje || 'No se pudo cargar');
            document.getElementById('modalAnuncioTitulo').textContent = data.titulo || 'Comunicado';
            document.getElementById('modalAnuncioDescripcion').textContent = data.descripcion || 'Sin descripción';
            document.getElementById('modalAnuncioFechaLimite').textContent = data.fechaLimite || '—';
            document.getElementById('modalAnuncioFechaPub').textContent = data.fechaPublicacion || '—';
            document.getElementById('modalAnuncioEstado').textContent = data.estado || 'ACTIVO';
            document.getElementById('modalAnuncioCargando')?.classList.add('hidden');
            document.getElementById('modalAnuncioContenido')?.classList.remove('hidden');
        } catch (e) {
            document.getElementById('modalAnuncioCargando')?.classList.add('hidden');
            const err = document.getElementById('modalAnuncioError');
            if (err) {
                err.textContent = '⚠️ ' + (e.message || 'Error al cargar');
                err.classList.remove('hidden');
            }
        }
    };

    window.cerrarModalAnuncio = function () {
        document.getElementById('modalAnuncio')?.classList.add('hidden');
    };

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
    }
</script>
</body>
</html>
