<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Recuperar contraseña — Event Organizer UCE</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="auth-page-body">

<div th:replace="~{fragments/auth-common :: authBackground}"></div>
<header th:replace="~{fragments/auth-common :: authTopbar}"></header>

<div class="auth-page-content">
    <section class="auth-form-panel" style="flex:1;max-width:480px;margin:0 auto;">
        <div class="auth-split-card fade-in">
            <div class="auth-float-brand auth-form-logo-compact" style="margin-bottom:1.25rem;">
                <h2>Recuperar contraseña</h2>
                <p>Verifica tu identidad con correo y teléfono registrados</p>
            </div>

            <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>

            <form th:action="@{/recuperar-contrasena}" method="post" class="auth-form">
                <div class="form-group">
                    <label class="form-label">Correo institucional</label>
                    <input type="email" name="correo" class="form-control auth-input-lg" required
                           placeholder="nombre@uce.edu.ec" pattern=".+@uce\.edu\.ec$"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Teléfono registrado</label>
                    <input type="tel" name="telefono" class="form-control auth-input-lg" required
                           pattern="\d{10}" maxlength="10" placeholder="0991234567"
                           title="10 dígitos, el mismo de tu perfil"/>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg">Continuar</button>
            </form>

            <a th:href="@{/login}" class="btn btn-outline btn-full btn-lg" style="margin-top:1rem;">Volver al login</a>
        </div>
    </section>
</div>

<script th:replace="~{fragments/auth-common :: authThemeScript}"></script>
</body>
</html>
